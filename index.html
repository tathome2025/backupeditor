<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ToneLab 相片編輯 Demo</title>
  <link rel="stylesheet" href="./static/app.css">
  <script src="./static/app.js" defer></script>
</head>
<body>
  <main class="app-shell">
    <aside class="sidebar sidebar-left">
      <header class="sidebar-head">
        <p class="sidebar-kicker">Develop</p>
        <h1>ToneLab</h1>
        <p class="panel-summary" id="adjustmentSummary">亮度、對比、飽和度與色溫皆為 0。</p>
      </header>

      <section class="group">
        <div class="group-head">
          <span>Preset</span>
          <strong>Looks</strong>
        </div>

        <div class="preset-grid" id="presetButtons">
          <button class="preset-button active" data-preset="clean" type="button">Clean</button>
          <button class="preset-button" data-preset="portrait" type="button">Portrait</button>
          <button class="preset-button" data-preset="sunset" type="button">Sunset</button>
          <button class="preset-button" data-preset="mono" type="button">Mono</button>
          <button class="preset-button" data-preset="cool" type="button">Cool</button>
        </div>
      </section>

      <section class="group">
        <div class="group-head">
          <span>Light</span>
          <strong>Tone</strong>
        </div>

        <div class="slider-block">
          <div class="slider-head">
            <label for="brightnessInput">亮度</label>
            <output id="brightnessValue">0</output>
          </div>
          <input id="brightnessInput" type="range" min="-100" max="100" step="1" value="0">
        </div>

        <div class="slider-block">
          <div class="slider-head">
            <label for="contrastInput">對比</label>
            <output id="contrastValue">0</output>
          </div>
          <input id="contrastInput" type="range" min="-100" max="100" step="1" value="0">
        </div>

        <div class="slider-block">
          <div class="slider-head">
            <label for="saturationInput">飽和度</label>
            <output id="saturationValue">0</output>
          </div>
          <input id="saturationInput" type="range" min="-100" max="100" step="1" value="0">
        </div>

        <div class="slider-block">
          <div class="slider-head">
            <label for="temperatureInput">色溫</label>
            <output id="temperatureValue">0</output>
          </div>
          <input id="temperatureInput" type="range" min="-100" max="100" step="1" value="0">
        </div>
      </section>

      <section class="group">
        <div class="group-head">
          <span>Geometry</span>
          <strong>Rotate & Resize</strong>
        </div>

        <div class="button-row">
          <button class="button ghost" id="rotateLeftBtn" type="button">左轉 90°</button>
          <button class="button ghost" id="rotateRightBtn" type="button">右轉 90°</button>
          <button class="button ghost" id="resetRotationBtn" type="button">歸零</button>
        </div>

        <div class="slider-block">
          <div class="slider-head">
            <label for="rotationInput">角度</label>
            <output id="rotationValue">0°</output>
          </div>
          <input id="rotationInput" type="range" min="-180" max="180" step="1" value="0">
        </div>

        <div class="size-grid">
          <label class="field">
            <span>輸出寬度</span>
            <input id="outputWidthInput" type="number" min="1" max="6000" step="1" value="0">
          </label>
          <label class="field">
            <span>輸出高度</span>
            <input id="outputHeightInput" type="number" min="1" max="6000" step="1" value="0">
          </label>
        </div>

        <div class="inline-row">
          <label class="switch">
            <input id="aspectLockInput" type="checkbox" checked>
            <span>鎖定比例</span>
          </label>
          <button class="text-button" id="syncSizeBtn" type="button">依內容重設</button>
        </div>
      </section>

      <section class="group">
        <div class="group-head">
          <span>Crop</span>
          <strong>Selection</strong>
        </div>

        <div class="button-row">
          <button class="button ghost" id="toggleCropModeBtn" type="button">開啟裁切</button>
          <button class="button ghost" id="resetCropBtn" type="button">重設裁切</button>
          <button class="button ghost" id="resetAllBtn" type="button">全部重設</button>
        </div>

        <div class="size-grid">
          <label class="field">
            <span>X</span>
            <input id="cropXInput" type="number" min="0" step="1" value="0">
          </label>
          <label class="field">
            <span>Y</span>
            <input id="cropYInput" type="number" min="0" step="1" value="0">
          </label>
          <label class="field">
            <span>W</span>
            <input id="cropWidthInput" type="number" min="1" step="1" value="0">
          </label>
          <label class="field">
            <span>H</span>
            <input id="cropHeightInput" type="number" min="1" step="1" value="0">
          </label>
        </div>
      </section>
    </aside>

    <section class="preview-shell">
      <div class="preview-toolbar">
        <div class="toolbar-chips">
          <span class="micro-chip" id="modeChip">Preview 模式</span>
          <span class="micro-chip" id="dimensionChip">0 × 0</span>
        </div>
        <span class="status-inline" id="statusText">尚未載入圖片。</span>
      </div>

      <div class="preview-stage" id="previewStage">
        <canvas id="previewCanvas"></canvas>

        <label class="stage-placeholder" id="stagePlaceholder" for="uploadInput">
          <input id="uploadInput" type="file" accept=".jpg,.jpeg,.png,image/jpeg,image/png">
          <span class="placeholder-kicker">Import Photo</span>
          <strong>上傳 JPG / PNG</strong>
          <small>點擊選擇檔案，或把圖片拖曳到這個預覽區</small>
        </label>

        <div class="crop-overlay" id="cropOverlay" hidden>
          <div class="crop-box" id="cropBox">
            <button aria-label="Resize north west" class="crop-handle handle-nw" data-handle="nw" type="button"></button>
            <button aria-label="Resize north" class="crop-handle handle-n" data-handle="n" type="button"></button>
            <button aria-label="Resize north east" class="crop-handle handle-ne" data-handle="ne" type="button"></button>
            <button aria-label="Resize east" class="crop-handle handle-e" data-handle="e" type="button"></button>
            <button aria-label="Resize south east" class="crop-handle handle-se" data-handle="se" type="button"></button>
            <button aria-label="Resize south" class="crop-handle handle-s" data-handle="s" type="button"></button>
            <button aria-label="Resize south west" class="crop-handle handle-sw" data-handle="sw" type="button"></button>
            <button aria-label="Resize west" class="crop-handle handle-w" data-handle="w" type="button"></button>
          </div>
        </div>
      </div>
    </section>

    <aside class="sidebar sidebar-right">
      <section class="group">
        <div class="group-head">
          <span>Photo</span>
          <strong>Info</strong>
        </div>

        <div class="meta-grid">
          <div class="meta-item">
            <span>檔名</span>
            <strong id="fileNameText">尚未載入</strong>
          </div>
          <div class="meta-item">
            <span>尺寸</span>
            <strong id="originalDimensionText">-</strong>
          </div>
          <div class="meta-item">
            <span>格式</span>
            <strong id="originalFormatText">-</strong>
          </div>
          <div class="meta-item">
            <span>模式</span>
            <strong id="modeText">待機</strong>
          </div>
          <div class="meta-item">
            <span>檔案大小</span>
            <strong id="fileSizeText">-</strong>
          </div>
        </div>

        <button class="text-button" id="replacePhotoBtn" type="button">更換相片</button>
        <p class="panel-summary" id="sourceSummary">等待載入圖片。</p>
      </section>

      <section class="group">
        <div class="group-head">
          <span>Metadata</span>
          <strong>EXIF</strong>
        </div>

        <dl class="exif-list">
          <div class="exif-row">
            <dt>Camera</dt>
            <dd id="exifMakeValue">-</dd>
          </div>
          <div class="exif-row">
            <dt>Model</dt>
            <dd id="exifModelValue">-</dd>
          </div>
          <div class="exif-row">
            <dt>Lens</dt>
            <dd id="exifLensValue">-</dd>
          </div>
          <div class="exif-row">
            <dt>Date</dt>
            <dd id="exifDateValue">-</dd>
          </div>
          <div class="exif-row">
            <dt>Exposure</dt>
            <dd id="exifExposureValue">-</dd>
          </div>
          <div class="exif-row">
            <dt>Aperture</dt>
            <dd id="exifApertureValue">-</dd>
          </div>
          <div class="exif-row">
            <dt>ISO</dt>
            <dd id="exifIsoValue">-</dd>
          </div>
          <div class="exif-row">
            <dt>Focal</dt>
            <dd id="exifFocalValue">-</dd>
          </div>
        </dl>
      </section>

      <section class="group">
        <div class="group-head">
          <span>Export</span>
          <strong>Output</strong>
        </div>

        <div class="size-grid">
          <label class="field">
            <span>格式</span>
            <select id="exportFormatInput">
              <option value="image/jpeg">JPG</option>
              <option value="image/png">PNG</option>
            </select>
          </label>
          <label class="field" id="qualityField">
            <span>JPG 品質</span>
            <div class="quality-wrap">
              <input id="qualityInput" type="range" min="60" max="100" step="1" value="92">
              <output id="qualityValue">92</output>
            </div>
          </label>
        </div>

        <button class="button primary full-width" id="exportBtn" type="button">匯出 JPG / PNG</button>
        <p class="panel-summary" id="exportSummary">未設定輸出尺寸。</p>
      </section>
    </aside>
  </main>
</body>
</html>
